<!DOCTYPE html>
<html>
<head>
<title>Slot Machine Demo</title>
<style>
body{
    text-align:center;
    font-family:Arial;
    margin-top:50px;
}
.slot{
    font-size:60px;
    margin:20px;
}
button{
    padding:10px 20px;
    font-size:20px;
}
</style>
</head>
<body>

<h1>🎰 Slot Machine Demo</h1>

<div class="slot" id="result">🍒 🍋 🍊</div>

<button onclick="spin()">SPIN</button>

<script>
function spin() {
    const symbols = ["🍒","🍋","🍊","⭐","💎","7️⃣"];
    let a = symbols[Math.floor(Math.random()*symbols.length)];
    let b = symbols[Math.floor(Math.random()*symbols.length)];
    let c = symbols[Math.floor(Math.random()*symbols.length)];

    document.getElementById("result").innerText =
        a + " " + b + " " + c;
}
</script>

</body>
</html>
