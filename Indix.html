<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wenggay Legend App 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --bg: #0a0a0a; --text: #fff; --glass: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        body.light { --bg: #f5f5f5; --text: #0a0a0a; --glass: rgba(0,0,0,0.05); --border: rgba(0,0,0,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: all 0.3s; }
     .glass { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); }
     .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
     .hidden { display: none!important; }
     .like-btn.liked { color: #ef4444; }
     .comment-like.liked { color: #ef4444; }
     .comment-box { background: var(--glass); }
        button { cursor: pointer; z-index: 10; }
       .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; }
       .chat-box { height: 400px; overflow-y: auto; }
    </style>
</head>
<body class="min-h-screen">
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 w-full max-w-md">
            <h1 class="text-3xl font-bold text-center mb-8">Welcome Wenggay 👑</h1>
            <div id="login-form">
                <input id="login-email" type="email" placeholder="Email" class="w-full mb-4 p-3 rounded-lg bg-white/10 border border-white/20 text-white">
                <input id="login-password" type="password" placeholder="Password" class="w-full mb-4 p-3 rounded-lg bg-white/10 border border-white/20 text-white">
                <button onclick="handleLogin()" class="w-full btn-primary text-white p-3 rounded-lg font-semibold mb-4">Login</button>
                <p class="text-center text-gray-400">No account? <span onclick="showSignupForm()" class="text-purple-400 cursor-pointer underline">Sign up</span></p>
            </div>
            <div id="signup-form" class="hidden">
                <input id="signup-name" type="text" placeholder="Full Name" class="w-full mb-4 p-3 rounded-lg bg-white/10 border border-white/20 text-white">
                <input id="signup-email" type="email" placeholder="Email" class="w-full mb-4 p-3 rounded-lg bg-white/10 border border-white/20 text-white">
                <input id="signup-password" type="password" placeholder="Password (6+ characters)" class="w-full mb-4 p-3 rounded-lg bg-white/10 border border-white/20 text-white">
                <button onclick="handleSignup()" class="w-full btn-primary text-white p-3 rounded-lg font-semibold mb-4">Sign Up</button>
                <p class="text-center text-gray-400">Have account? <span onclick="showLoginForm()" class="text-purple-400 cursor-pointer underline">Login</span></p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="glass sticky top-0 z-50 p-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center gap-4">
                <h1 class="text-2xl font-bold">Wenggay Social 👑</h1>
                <input id="search-input" type="text" placeholder="Search users..." class="flex-1 max-w-xs p-2 rounded-lg bg-white/10 border border-white/20 text-sm hidden md:block">
                <div class="flex items-center gap-3">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-white/10 text-xl">🌙</button>
                    <button onclick="openChatList()" class="p-2 rounded-lg bg-white/10 text-xl relative">💬<span id="chat-badge" class="absolute -top-1 -right-1 bg-red-500 text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span></button>
                    <div class="text-right hidden md:block">
                        <p id="user-name" class="font-semibold"></p>
                        <p class="text-xs text-gray-400">Level <span id="user-level">1</span></p>
                    </div>
                    <button onclick="handleLogout()" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-lg text-sm">Logout</button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-4 grid md:grid-cols-4 gap-6">
            <div class="md:col-span-1 space-y-4">
                <div class="glass rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4">Profile</h2>
                    <div class="text-center mb-4">
                        <div class="relative w-24 h-24 mx-auto mb-3">
                            <img id="profile-pic" src="" class="w-24 h-24 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full object-cover hidden">
                            <div id="profile-initial-bg" class="w-24 h-24 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center text-2xl font-bold">
                                <span id="profile-initial">W</span>
                            </div>
                            <input type="file" id="profile-pic-input" accept="image/*" class="hidden">
                            <button onclick="document.getElementById('profile-pic-input').click()" class="absolute bottom-0 right-0 bg-purple-500 rounded-full p-1 text-xs">📷</button>
                        </div>
                        <h3 id="profile-name" class="font-semibold text-lg"></h3>
                        <p id="profile-bio" class="text-gray-400 text-sm mt-2">Click edit to add bio</p>
                    </div>
                    <textarea id="bio-input" placeholder="Write your bio..." class="w-full p-3 rounded-lg bg-white/10 border border-white/20 text-white text-sm mb-3 hidden"></textarea>
                    <button onclick="editBio()" class="w-full bg-white/10 text-white p-2 rounded-lg text-sm mb-3">Edit Bio</button>
                    <button onclick="saveBio()" id="save-bio-btn" class="w-full btn-primary text-white p-2 rounded-lg text-sm mb-3 hidden">Save Bio</button>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-gray-400">Posts</span><span id="post-count">0</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Level</span><span id="profile-level">1</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Followers</span><span id="follower-count">0</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Following</span><span id="following-count">0</span></div>
                    </div>
                </div>
                <div id="search-results" class="glass rounded-2xl p-4 hidden">
                    <h3 class="font-bold mb-3">Search Results</h3>
                    <div id="search-list" class="space-y-2"></div>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="glass rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4">Create Post</h2>
                    <textarea id="post-content" placeholder="What's on your mind, Wenggay?" class="w-full p-3 rounded-lg bg-white/10 border border-white/20 text-white mb-3 h-24"></textarea>
                    <input type="file" id="post-image" accept="image/*" class="w-full mb-3 text-sm text-gray-400">
                    <div id="image-preview" class="hidden mb-3">
                        <img id="preview-img" class="w-full rounded-lg max-h-64 object-cover">
                        <button onclick="removeSelectedImage()" class="text-red-400 text-sm mt-2">Remove Image</button>
                    </div>
                    <button onclick="createPost()" class="w-full btn-primary text-white p-3 rounded-lg font-semibold">Post</button>
                </div>
                <div id="posts-feed" class="space-y-4"></div>
            </div>

            <div class="md:col-span-1 space-y-4 hidden lg:block">
                <div class="glass rounded-2xl p-6">
                    <h3 class="font-bold mb-3">Suggested Users</h3>
                    <div id="suggested-users" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Chat Modal -->
    <div id="chat-modal" class="modal hidden">
        <div class="glass rounded-2xl w-full max-w-md m-4">
            <div class="p-4 border-b border-white/10 flex justify-between items-center">
                <h3 id="chat-with-name" class="font-bold">Chat</h3>
                <button onclick="closeChat()" class="text-2xl">×</button>
            </div>
            <div id="chat-messages" class="chat-box p-4 space-y-2"></div>
            <div class="p-4 border-t border-white/10 flex gap-2">
                <input id="chat-input" type="text" placeholder="Type message..." class="flex-1 p-2 rounded-lg bg-white/10 border border-white/20 text-white text-sm">
                <button onclick="sendMessage()" class="bg-purple-500 text-white px-4 py-2 rounded-lg text-sm">Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDoc, getDocs, setDoc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, increment, deleteDoc, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCeHwDLfwsAwXh6Wf0fwCw-nwSLSmPj_qI",
            authDomain: "rowena-portfolio.firebaseapp.com",
            projectId: "rowena-portfolio",
            storageBucket: "rowena-portfolio.firebasestorage.app",
            messagingSenderId: "352213537262",
            appId: "1:352213537262:web:b58a90d30c1f5fa78f7eff"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.currentUser = null;
        window.userData = null;
        window.selectedImage = null;
        window.currentChatUser = null;
        window.isDark = true;

        window.showSignupForm = () => {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
        };

        window.showLoginForm = () => {
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                await loadUserData();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadPosts();
                loadSuggestedUsers();
                loadChatBadge();
            } else {
                window.currentUser = null;
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        window.handleSignup = async () => {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            if (!name ||!email ||!password) return alert('Fill all fields');
            if (password.length < 6) return alert('Password must be 6+ characters');
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCred.user, { displayName: name });
                await setDoc(doc(db, 'users', userCred.user.uid), {
                    name: name, email: email, bio: '', profilePic: '', level: 1, posts: 0, followers: [], following: [], createdAt: serverTimestamp()
                });
            } catch (error) { alert('Signup failed: ' + error.message); }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email ||!password) return alert('Fill all fields');
            try { await signInWithEmailAndPassword(auth, email, password); } 
            catch (error) { alert('Login failed: ' + error.message); }
        };

        window.handleLogout = () => signOut(auth);

        async function loadUserData() {
            const userDoc = await getDoc(doc(db, 'users', window.currentUser.uid));
            if (userDoc.exists()) {
                window.userData = userDoc.data();
                document.getElementById('user-name').textContent = window.userData.name;
                document.getElementById('profile-name').textContent = window.userData.name;
                document.getElementById('profile-bio').textContent = window.userData.bio || 'Click edit to add bio';
                document.getElementById('profile-initial').textContent = window.userData.name[0].toUpperCase();
                document.getElementById('user-level').textContent = window.userData.level || 1;
                document.getElementById('profile-level').textContent = window.userData.level || 1;
                document.getElementById('post-count').textContent = window.userData.posts || 0;
                document.getElementById('follower-count').textContent = (window.userData.followers || []).length;
                document.getElementById('following-count').textContent = (window.userData.following || []).length;
                if (window.userData.profilePic) {
                    document.getElementById('profile-pic').src = window.userData.profilePic;
                    document.getElementById('profile-pic').classList.remove('hidden');
                    document.getElementById('profile-initial-bg').classList.add('hidden');
                }
            }
        }

        window.toggleDarkMode = () => {
            window.isDark =!window.isDark;
            document.body.classList.toggle('light');
            event.target.textContent = window.isDark? '🌙' : '☀️';
            localStorage.setItem('darkMode', window.isDark);
        };

        if (localStorage.getItem('darkMode') === 'false') toggleDarkMode();

        document.getElementById('profile-pic-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const pic = e.target.result;
                    await updateDoc(doc(db, 'users', window.currentUser.uid), { profilePic: pic });
                    window.userData.profilePic = pic;
                    document.getElementById('profile-pic').src = pic;
                    document.getElementById('profile-pic').classList.remove('hidden');
                    document.getElementById('profile-initial-bg').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        window.editBio = () => {
            document.getElementById('bio-input').value = window.userData.bio || '';
            document.getElementById('bio-input').classList.remove('hidden');
            document.getElementById('save-bio-btn').classList.remove('hidden');
            event.target.classList.add('hidden');
            document.getElementById('profile-bio').classList.add('hidden');
        };

        window.saveBio = async () => {
            const newBio = document.getElementById('bio-input').value;
            await updateDoc(doc(db, 'users', window.currentUser.uid), { bio: newBio });
            window.userData.bio = newBio;
            document.getElementById('profile-bio').textContent = newBio || 'Click edit to add bio';
            document.getElementById('bio-input').classList.add('hidden');
            document.getElementById('save-bio-btn').classList.add('hidden');
            document.querySelector('[onclick="editBio()"]').classList.remove('hidden');
            document.getElementById('profile-bio').classList.remove('hidden');
        };

        document.getElementById('post-image').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    window.selectedImage = e.target.result;
                    document.getElementById('preview-img').src = window.selectedImage;
                    document.getElementById('image-preview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        window.removeSelectedImage = () => {
            window.selectedImage = null;
            document.getElementById('post-image').value = '';
            document.getElementById('image-preview').classList.add('hidden');
        };

        window.createPost = async () => {
            const content = document.getElementById('post-content').value.trim();
            if (!content &&!window.selectedImage) return alert('Write something or add image');
            try {
                await addDoc(collection(db, 'posts'), {
                    content: content, image: window.selectedImage || null, authorId: window.currentUser.uid,
                    authorName: window.userData.name, authorPic: window.userData.profilePic || '', likes: [], comments: [], createdAt: serverTimestamp()
                });
                await updateDoc(doc(db, 'users', window.currentUser.uid), {
                    posts: increment(1), level: Math.floor(((window.userData.posts || 0) + 1) / 5) + 1
                });
                document.getElementById('post-content').value = '';
                window.selectedImage = null;
                document.getElementById('post-image').value = '';
                document.getElementById('image-preview').classList.add('hidden');
                await loadUserData();
            } catch (error) { alert('Post failed: ' + error.message); }
        };

        function loadPosts() {
            const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
            onSnapshot(q, (snapshot) => {
                const postsFeed = document.getElementById('posts-feed');
                postsFeed.innerHTML = '';
                if (snapshot.empty) {
                    postsFeed.innerHTML = '<div class="glass rounded-2xl p-6 text-center text-gray-400">No posts yet. Create one!</div>';
                    return;
                }
                snapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const postId = docSnap.id;
                    const isLiked = post.likes?.includes(window.currentUser.uid);
                    const isOwner = post.authorId === window.currentUser.uid;
                    const isFollowing = (window.userData.following || []).includes(post.authorId);

                    let timeString = 'Just now';
                    try { if (post.createdAt?.toDate) timeString = post.createdAt.toDate().toLocaleString(); } catch(e) {}

                    const postEl = doc
