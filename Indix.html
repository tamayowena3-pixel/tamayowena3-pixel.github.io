<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wenggay Legend App 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }
     .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
     .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
     .hidden { display: none!important; }
     .like-btn.liked { color: #ef4444; }
     .comment-box { background: rgba(255,255,255,0.03); }
        button { cursor: pointer; z-index: 9999; }
    </style>
</head>
<body class="min-h-screen">
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 w-full max-w-md">
            <h1 class="text-3xl font-bold text-center mb-8">Welcome Wenggay 👑</h1>
            <div id="login-form">
                <input id="login-email" type="email" placeholder="Email" class="w-full mb-4 p-3 rounded-lg bg-white/10 border border-white/20 text-white">
                <input id="login-password" type="password" placeholder="Password" class="w-full mb-4 p-3 rounded-lg bg-white/10 border border-white/20 text-white">
                <button onclick="handleLogin()" class="w-full btn-primary text-white p-3 rounded-lg font-semibold mb-4">Login</button>
                <p class="text-center text-gray-400">No account? <span onclick="showSignupForm()" class="text-purple-400 cursor-pointer underline">Sign up</span></p>
            </div>
            <div id="signup-form" class="hidden">
                <input id="signup-name" type="text" placeholder="Full Name" class="w-full mb-4 p-3 rounded-lg bg-white/10 border border-white/20 text-white">
                <input id="signup-email" type="email" placeholder="Email" class="w-full mb-4 p-3 rounded-lg bg-white/10 border border-white/20 text-white">
                <input id="signup-password" type="password" placeholder="Password (6+ characters)" class="w-full mb-4 p-3 rounded-lg bg-white/10 border border-white/20 text-white">
                <button onclick="handleSignup()" class="w-full btn-primary text-white p-3 rounded-lg font-semibold mb-4">Sign Up</button>
                <p class="text-center text-gray-400">Have account? <span onclick="showLoginForm()" class="text-purple-400 cursor-pointer underline">Login</span></p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="glass sticky top-0 z-50 p-4">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold">Wenggay Social 👑</h1>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="user-name" class="font-semibold"></p>
                        <p class="text-xs text-gray-400">Level <span id="user-level">1</span></p>
                    </div>
                    <button onclick="handleLogout()" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-lg">Logout</button>
                </div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto p-4 grid md:grid-cols-3 gap-6">
            <div class="md:col-span-1">
                <div class="glass rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4">Profile</h2>
                    <div class="text-center mb-4">
                        <div class="w-20 h-20 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full mx-auto mb-3 flex items-center justify-center text-2xl font-bold">
                            <span id="profile-initial">W</span>
                        </div>
                        <h3 id="profile-name" class="font-semibold text-lg"></h3>
                        <p id="profile-bio" class="text-gray-400 text-sm mt-2">Click edit to add bio</p>
                    </div>
                    <textarea id="bio-input" placeholder="Write your bio..." class="w-full p-3 rounded-lg bg-white/10 border border-white/20 text-white text-sm mb-3 hidden"></textarea>
                    <button onclick="editBio()" class="w-full bg-white/10 text-white p-2 rounded-lg text-sm mb-3">Edit Bio</button>
                    <button onclick="saveBio()" id="save-bio-btn" class="w-full btn-primary text-white p-2 rounded-lg text-sm mb-3 hidden">Save Bio</button>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-gray-400">Posts</span><span id="post-count">0</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Level</span><span id="profile-level">1</span></div>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="glass rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4">Create Post</h2>
                    <textarea id="post-content" placeholder="What's on your mind, Wenggay?" class="w-full p-3 rounded-lg bg-white/10 border border-white/20 text-white mb-3 h-24"></textarea>
                    <input type="file" id="post-image" accept="image/*" class="w-full mb-3 text-sm text-gray-400">
                    <div id="image-preview" class="hidden mb-3">
                        <img id="preview-img" class="w-full rounded-lg max-h-64 object-cover">
                        <button onclick="removeSelectedImage()" class="text-red-400 text-sm mt-2">Remove Image</button>
                    </div>
                    <button onclick="createPost()" class="w-full btn-primary text-white p-3 rounded-lg font-semibold">Post</button>
                </div>
                <div id="posts-feed" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, increment, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCeHwDLfwsAwXh6Wf0fwCw-nwSLSmPj_qI",
            authDomain: "rowena-portfolio.firebaseapp.com",
            projectId: "rowena-portfolio",
            storageBucket: "rowena-portfolio.firebasestorage.app",
            messagingSenderId: "352213537262",
            appId: "1:352213537262:web:b58a90d30c1f5fa78f7eff"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.currentUser = null;
        window.userData = null;
        window.selectedImage = null;

        window.showSignupForm = () => {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
        };

        window.showLoginForm = () => {
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                await loadUserData();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadPosts();
            } else {
                window.currentUser = null;
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        window.handleSignup = async () => {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            if (!name ||!email ||!password) return alert('Fill all fields Wenggay');
            if (password.length < 6) return alert('Password must be 6+ characters');
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCred.user, { displayName: name });
                await setDoc(doc(db, 'users', userCred.user.uid), {
                    name: name, email: email, bio: '', level: 1, posts: 0, createdAt: serverTimestamp()
                });
            } catch (error) {
                alert('Signup failed: ' + error.message);
            }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email ||!password) return alert('Fill all fields Wenggay');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        };

        window.handleLogout = () => signOut(auth);

        async function loadUserData() {
            const userDoc = await getDoc(doc(db, 'users', window.currentUser.uid));
            if (userDoc.exists()) {
                window.userData = userDoc.data();
                document.getElementById('user-name').textContent = window.userData.name || 'User';
                document.getElementById('profile-name').textContent = window.userData.name || 'User';
                document.getElementById('profile-bio').textContent = window.userData.bio || 'Click edit to add bio';
                document.getElementById('profile-initial').textContent = (window.userData.name || 'U')[0].toUpperCase();
                document.getElementById('user-level').textContent = window.userData.level || 1;
                document.getElementById('profile-level').textContent = window.userData.level || 1;
                document.getElementById('post-count').textContent = window.userData.posts || 0;
            }
        }

        window.editBio = () => {
            document.getElementById('bio-input').value = window.userData.bio || '';
            document.getElementById('bio-input').classList.remove('hidden');
            document.getElementById('save-bio-btn').classList.remove('hidden');
            event.target.classList.add('hidden');
            document.getElementById('profile-bio').classList.add('hidden');
        };

        window.saveBio = async () => {
            const newBio = document.getElementById('bio-input').value;
            await updateDoc(doc(db, 'users', window.currentUser.uid), { bio: newBio });
            window.userData.bio = newBio;
            document.getElementById('profile-bio').textContent = newBio || 'Click edit to add bio';
            document.getElementById('bio-input').classList.add('hidden');
            document.getElementById('save-bio-btn').classList.add('hidden');
            document.querySelector('[onclick="editBio()"]').classList.remove('hidden');
            document.getElementById('profile-bio').classList.remove('hidden');
        };

        document.getElementById('post-image').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    window.selectedImage = e.target.result;
                    document.getElementById('preview-img').src = window.selectedImage;
                    document.getElementById('image-preview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        window.removeSelectedImage = () => {
            window.selectedImage = null;
            document.getElementById('post-image').value = '';
            document.getElementById('image-preview').classList.add('hidden');
        };

        window.createPost = async () => {
            const content = document.getElementById('post-content').value.trim();
            if (!content &&!window.selectedImage) return alert('Write something or add image');
            try {
                await addDoc(collection(db, 'posts'), {
                    content: content,
                    image: window.selectedImage || null,
                    authorId: window.currentUser.uid,
                    authorName: window.userData.name,
                    likes: [],
                    comments: [],
                    createdAt: serverTimestamp()
                });
                await updateDoc(doc(db, 'users', window.currentUser.uid), {
                    posts: increment(1),
                    level: Math.floor(((window.userData.posts || 0) + 1) / 5) + 1
                });
                document.getElementById('post-content').value = '';
                window.selectedImage = null;
                document.getElementById('post-image').value = '';
                document.getElementById('image-preview').classList.add('hidden');
                await loadUserData();
            } catch (error) {
                alert('Post failed: ' + error.message);
            }
        };

        function loadPosts() {
            const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
            onSnapshot(q, (snapshot) => {
                const postsFeed = document.getElementById('posts-feed');
                postsFeed.innerHTML = '';
                if (snapshot.empty) {
                    postsFeed.innerHTML = '<div class="glass rounded-2xl p-6 text-center text-gray-400">No posts yet. Create one!</div>';
                    return;
                }
                snapshot.forEach((doc) => {
                    try {
                        const post = doc.data();
                        const postId = doc.id;
                        const isLiked = post.likes?.includes(window.currentUser.uid);
                        const isOwner = post.authorId === window.currentUser.uid;

                        let timeString = 'Just now';
                        try {
                            if (post.createdAt && typeof post.createdAt.toDate === 'function') {
                                timeString = post.createdAt.toDate().toLocaleString();
                            }
                        } catch(e) {}

                        const postEl = document.createElement('div');
                        postEl.className = 'glass rounded-2xl p-6';
                        postEl.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-semibold">${post.authorName || 'Anonymous'}</h3>
                                    <p class="text-xs text-gray-400">${timeString}</p>
                                </div>
                                ${isOwner? `<button onclick="deletePost('${postId}')" class="text-red-400 text-sm">Delete</button>` : ''}
                            </div>
                            <p class="mb-4">${post.content || ''}</p>
                            ${post.image? `<img src="${post.image}" class="w-full rounded-lg mb-4 max-h-96 object-cover">` : ''}
                            <div class="flex gap-4 text-sm text-gray-400 border-t border-white/10 pt-4">
                                <button onclick="toggleLike('${postId}')" class="like-btn flex items-center gap-1 ${isLiked? 'liked' : ''}">
                                    <span>❤️</span> <span>${post.likes?.length || 0}</span>
                                </button>
                                <button onclick="toggleComments('${postId}')" class="comment-btn flex items-center gap-1">
                                    <span>💬</span> <span>${post.comments?.length || 0}</span>
                                </button>
                            </div>
                            <div class="comments-section mt-4 hidden" id="comments-${postId}">
                                <div class="comments-list space-y-2 mb-3">
                                    ${(post.comments || []).map(c => `<div class="comment-box p-3 rounded-lg text-sm"><span class="font-semibold">${c.authorName}:</span> ${c.text}</div>`).join('')}
                                </div>
                                <div class="flex gap-2">
                                    <input type="text" id="comment-input-${postId}" placeholder="Write a comment..." class="flex-1 p-2 rounded-lg bg-white/10 border border-white/20 text-white text-sm">
                                    <button onclick="sendComment('${postId}')" class="bg-purple-500 text-white px-4 py-2 rounded-lg text-sm">Send</button>
                                </div>
                            </div>
                        `;
                        postsFeed.appendChild(postEl);
                    } catch (error) {
                        console.error('Error rendering post:', error);
                    }
                });
            });
        }

        window.toggleLike = async (postId) => {
            const postRef = doc(db, 'posts', postId);
            const postDoc = await getDoc(postRef);
            const likes = postDoc.data().likes || [];
            if (likes.includes(window.currentUser.uid)) {
                await updateDoc(postRef, { likes: arrayRemove(window.currentUser.uid) });
            } else {
                await updateDoc(postRef, { likes: arrayUnion(window.currentUser.uid) });
            }
        };

        window.toggleComments = (postId) => {
            document.getElementById(`comments-${postId}`).classList.toggle('hidden');
        };

        window.sendComment = async (postId) => {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            if (!text) return;
            await updateDoc(doc(db, 'posts', postId), {
                comments: arrayUnion({ text: text, authorId: window.currentUser.uid, authorName: window.userData.name, createdAt: new Date() })
            });
            input.value = '';
        };

        window.deletePost = async (postId) => {
            if (confirm('Delete this post?')) {
                await deleteDoc(doc(db, 'posts', postId));
                await updateDoc(doc(db, 'users', window.currentUser.uid), { posts: increment(-1) });
                await loadUserData();
            }
        };
    </script>
</body>
</html>
