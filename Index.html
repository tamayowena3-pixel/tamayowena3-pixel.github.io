<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Social App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: #16213e;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
    }
    h1 {
      text-align: center;
      color: #0f4c75;
      margin-bottom: 20px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      box-sizing: border-box;
      font-size: 16px;
      font-family: Arial, sans-serif;
      position: relative;
      z-index: 2;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      position: relative;
      z-index: 2;
    }
    button:hover { background: #c73e54; }
    #messageDiv {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      text-align: center;
      display: none;
      font-weight: bold;
      position: relative;
      z-index: 3;
    }
    .success { background: #00b894; }
    .error { background: #d63031; }
    #dashboard, #editForm { display: none; }
    #logoutBtn { background: #636e72; }
    #logoutBtn:hover { background: #4a5255; }
    #editBtn { background: #00b894; }
    #editBtn:hover { background: #00a085; }
    #saveBtn { background: #0984e3; }
    #saveBtn:hover { background: #0870c0; }
    #cancelBtn { background: #636e72; }
    #uploadBtn { background: #6c5ce7; }
    #uploadBtn:hover { background: #5a4fcf; }
    #postBtn { background: #00b894; }
    #postBtn:hover { background: #00a085; }
    #feedBtn { background: #0984e3; }
    #feedBtn:hover { background: #0870c0; }
    #profileBtn { background: #6c5ce7; }
    #profileBtn:hover { background: #5a4fcf; }
    .profile-info {
      background: #0f3460;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      line-height: 1.8;
      text-align: center;
    }
    .profile-pic {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #e94560;
      margin: 0 auto 15px;
      display: block;
    }
    .file-input {
      display: none;
    }
    .post {
      background: #0f3460;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      text-align: left;
    }
    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .post-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
      border: 2px solid #e94560;
    }
    .post-name {
      font-weight: bold;
      color: #00b894;
    }
    .post-time {
      font-size: 12px;
      color: #999;
    }
    .post-content {
      margin: 10px 0;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .delete-post-btn {
      background: #d63031;
      padding: 5px 10px;
      font-size: 12px;
      width: auto;
      margin-top: 5px;
    }
    .delete-post-btn:hover { background: #b02324; }
    .nav-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .nav-buttons button {
      flex: 1;
      margin: 0;
    }
    #globalFeed, #myPosts { display: none; }
    .section-title {
      text-align: center;
      margin: 20px 0 10px;
      color: #00b894;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 Firebase Social</h1>

    <!-- AUTH FORM -->
    <div id="authForm">
      <input type="email" id="emailInput" placeholder="Email" autocomplete="email">
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password">
      <input type="text" id="nameInput" placeholder="Name (for Sign Up)" autocomplete="name">
      <input type="text" id="bioInput" placeholder="Bio (for Sign Up)">
      <button id="signUpBtn">Sign Up</button>
      <button id="loginBtn">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
      <div class="nav-buttons">
        <button id="profileBtn">Profile</button>
        <button id="feedBtn">Global Feed</button>
        <button id="logoutBtn">Logout</button>
      </div>

      <!-- PROFILE SECTION -->
      <div id="profileSection">
        <h2 class="section-title">Your Profile</h2>
        <div class="profile-info" id="profileInfo"></div>
        <input type="file" id="fileInput" class="file-input" accept="image/*">
        <button id="uploadBtn">Upload Profile Picture</button>
        <button id="editBtn">Edit Profile</button>
        
        <h3 class="section-title">Create Post</h3>
        <textarea id="postInput" placeholder="What's on your mind?" rows="3"></textarea>
        <button id="postBtn">Post</button>
        
        <h3 class="section-title">Your Posts</h3>
        <div id="myPosts"></div>
      </div>

      <!-- GLOBAL FEED SECTION -->
      <div id="globalFeed">
        <h2 class="section-title">Global Feed</h2>
        <div id="feedPosts"></div>
      </div>
    </div>

    <!-- EDIT FORM -->
    <div id="editForm">
      <h2>Edit Profile</h2>
      <input type="text" id="editNameInput" placeholder="Name">
      <textarea id="editBioInput" placeholder="Bio" rows="3"></textarea>
      <button id="saveBtn">Save Changes</button>
      <button id="cancelBtn">Cancel</button>
    </div>

    <div id="messageDiv"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, query, orderBy, getDocs, deleteDoc, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCeHwDLfwsAwXh6Wf0fwCw-nwSLSmPj_qI",
      authDomain: "rowena-portfolio.firebaseapp.com",
      projectId: "rowena-portfolio",
      storageBucket: "rowena-portfolio.firebasestorage.app",
      messagingSenderId: "352213537262",
      appId: "1:352213537262:web:b58a90d30c1f5fa78f7eff"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const nameInput = document.getElementById('nameInput');
    const bioInput = document.getElementById('bioInput');
    const signUpBtn = document.getElementById('signUpBtn');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const editBtn = document.getElementById('editBtn');
    const saveBtn = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const postBtn = document.getElementById('postBtn');
    const postInput = document.getElementById('postInput');
    const feedBtn = document.getElementById('feedBtn');
    const profileBtn = document.getElementById('profileBtn');
    const messageDiv = document.getElementById('messageDiv');
    const authForm = document.getElementById('authForm');
    const dashboard = document.getElementById('dashboard');
    const editForm = document.getElementById('editForm');
    const profileInfo = document.getElementById('profileInfo');
    const editNameInput = document.getElementById('editNameInput');
    const editBioInput = document.getElementById('editBioInput');
    const profileSection = document.getElementById('profileSection');
    const globalFeed = document.getElementById('globalFeed');
    const feedPosts = document.getElementById('feedPosts');
    const myPosts = document.getElementById('myPosts');

    let currentUserData = null;

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = type;
      messageDiv.style.display = 'block';
      setTimeout(() => {
        messageDiv.style.display = 'none';
      }, 4000);
    }

    function timeAgo(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      if (seconds < 60) return 'Just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

    async function loadProfile(user) {
      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          currentUserData = userDoc.data();
          
          if (currentUserData.editCount === undefined) currentUserData.editCount = 0;
          if (currentUserData.level === undefined) currentUserData.level = "Beginner";
          
          let levelEmoji = "🌱";
          if (currentUserData.level === "Intermediate") levelEmoji = "🔥";
          if (currentUserData.level === "Expert") levelEmoji = "⚡";
          if (currentUserData.level === "Master") levelEmoji = "🥷";
          if (currentUserData.level === "Legend") levelEmoji = "👑";
          
          const profilePic = currentUserData.photoBase64 || 'https://via.placeholder.com/100/0f3460/ffffff?text=' + currentUserData.name.charAt(0);

          profileInfo.innerHTML = `
            <img src="${profilePic}" alt="Profile" class="profile-pic">
            <strong>Name:</strong> ${currentUserData.name}<br>
            <strong>Email:</strong> ${currentUserData.email}<br>
            <strong>Bio:</strong> ${currentUserData.bio}<br>
            <strong>Level:</strong> ${levelEmoji} ${currentUserData.level}<br>
            <strong>Edits:</strong> ${currentUserData.editCount}<br>
            <strong>Joined:</strong> ${new Date(currentUserData.joinDate).toLocaleDateString()}
          `;
          
          await loadMyPosts(user.uid);
        }
      } catch (error) {
        console.log(error);
        showMessage('Error loading profile', 'error');
      }
    }

    async function loadMyPosts(userId) {
      try {
        const q = query(
          collection(db, "posts"),
          where("userId", "==", userId),
          orderBy("createdAt", "desc")
        );
        const querySnapshot = await getDocs(q);
        
        myPosts.innerHTML = '';
        if (querySnapshot.empty) {
          myPosts.innerHTML = '<p style="text-align:center;color:#999;">No posts yet. Create one!</p>';
          return;
        }
        
        querySnapshot.forEach((doc) => {
          const post = doc.data();
          const postElement = createPostElement(doc.id, post, true);
          myPosts.appendChild(postElement);
        });
      } catch (error) {
        console.log(error);
      }
    }

    async function loadGlobalFeed() {
      try {
        const q = query(
          collection(db, "posts"),
          orderBy("createdAt", "desc")
        );
        const querySnapshot = await getDocs(q);
        
        feedPosts.innerHTML = '';
        if (querySnapshot.empty) {
          feedPosts.innerHTML = '<p style="text-align:center;color:#999;">No posts yet. Be the first!</p>';
          return;
        }
        
        querySnapshot.forEach((doc) => {
          const post = doc.data();
          const isMyPost = auth.currentUser && post.userId === auth.currentUser.uid;
          const postElement = createPostElement(doc.id, post, isMyPost);
          feedPosts.appendChild(postElement);
        });
      } catch (error) {
        console.log(error);
        showMessage('Error loading feed', 'error');
      }
    }

    function createPostElement(postId, post, canDelete) {
      const div = document.createElement('div');
      div.className = 'post';
      
      const userPic = post.userPhoto || 'https://via.placeholder.com/40/0f3460/ffffff?text=' + post.userName.charAt(0);
      const postDate = post.createdAt ? new Date(post.createdAt) : new Date();
      
      div.innerHTML = `
        <div class="post-header">
          <img src="${userPic}" alt="User" class="post-pic">
          <div>
            <div class="post-name">${post.userName}</div>
            <div class="post-time">${timeAgo(postDate)}</div>
          </div>
        <div class="post-content">${post.content}</div>
        ${canDelete ? `<button class="delete-post-btn" data-id="${postId}">Delete</button>` : ''}
      `;
      
      if (canDelete) {
        div.querySelector('.delete-post-btn').addEventListener('click', async () => {
          if (confirm('Delete this post?')) {
            await deleteDoc(doc(db, "posts", postId));
            showMessage('Post deleted', 'success');
            await loadMyPosts(auth.currentUser.uid);
            await loadGlobalFeed();
          }
        });
      }
      
      return div;
    }

    signUpBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const name = nameInput.value.trim();
      const bio = bioInput.value.trim();

      if (!email || !password) {
        showMessage('Please fill email and password', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('Password must be 6+ characters', 'error');
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
          email: user.email,
          name: name || "Anonymous",
          bio: bio || "New user",
          level: "Beginner",
          joinDate: new Date().toISOString(),
          photoBase64: null,
          editCount: 0
        });

        showMessage('Account created + Data saved!', 'success');
        emailInput.value = '';
        passwordInput.value = '';
        nameInput.value = '';
        bioInput.value = '';
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    loginBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage('Please fill email and password', 'error');
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showMessage('Logged in successfully!', 'success');
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await signOut(auth);
      showMessage('Logged out', 'success');
    });

    uploadBtn.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 900000) {
        showMessage('Image too large. Max 900KB', 'error');
        return;
      }

      showMessage('Uploading...', 'success');

      try {
        const reader = new FileReader();
        reader.onload = async (event) => {
          const base64String = event.target.result;
          const user = auth.currentUser;

          await updateDoc(doc(db, "users", user.uid), {
            photoBase64: base64String
          });

          showMessage('Profile picture updated!', 'success');
          await loadProfile(user);
          fileInput.value = '';
        };
        reader.readAsDataURL(file);
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    editBtn.addEventListener('click', () => {
      dashboard.style.display = 'none';
      editForm.style.display = 'block';
      editNameInput.value = currentUserData.name;
      editBioInput.value = currentUserData.bio;
    });

    cancelBtn.addEventListener('click', () => {
      editForm.style.display = 'none';
      dashboard.style.display = 'block';
    });

    saveBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      const newName = editNameInput.value.trim();
      const newBio = editBioInput.value.trim();

      if (!newName) {
        showMessage('Name cannot be empty', 'error');
        return;
      }

      try {
        const user = auth.currentUser;
        const userRef = doc(db, "users", user.uid);
        
        const currentEditCount = currentUserData.editCount || 0;
        const newEditCount = currentEditCount + 1;
        
        let newLevel = "Beginner";
        let levelEmoji = "🌱";
        
        if (newEditCount >= 50) {
          newLevel = "Legend";
          levelEmoji = "👑";
        } else if (newEditCount >= 20) {
          newLevel = "Master";
          levelEmoji = "🥷";
        } else if (newEditCount >= 10) {
          newLevel = "Expert";
          levelEmoji = "⚡";
        } else if (newEditCount >= 3) {
          newLevel = "Intermediate";
          levelEmoji = "🔥";
        }

        await updateDoc(userRef, {
          name: newName,
          bio: newBio,
          editCount: newEditCount,
          level: newLevel
        });

        if (newLevel !== currentUserData.level) {
          showMessage(`${levelEmoji} LEVEL UP! You are now ${newLevel}! 🎉`, 'success');
        } else {
          showMessage('Profile updated!', 'success');
        }

        await loadProfile(user);
        
        editForm.style.display = 'none';
        dashboard.style.display = 'block';
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    postBtn.addEventListener('click', async () => {
      const content = postInput.value.trim();
      
      if (!content) {
        showMessage('Post cannot be empty', 'error');
        return;
      }

      try {
        const user = auth.currentUser;
        
        await addDoc(collection(db, "posts"), {
          userId: user.uid,
          userName: currentUserData.name,
          userPhoto: currentUserData.photoBase64,
          content: content,
          createdAt: new Date().toISOString()
        });

        showMessage('Posted!', 'success');
        postInput.value = '';
        await loadMyPosts(user.uid);
        await loadGlobalFeed();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    profileBtn.addEventListener('click', () => {
      profileSection.style.display = 'block';
      globalFeed.style.display = 'none';
    });

    feedBtn.addEventListener('click', async () => {
      profileSection.style.display = 'none';
      globalFeed.style.display = 'block';
      await loadGlobalFeed();
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        authForm.style.display = 'none';
        dashboard.style.display = 'block';
        editForm.style.display = 'none';
        profileSection.style.display = 'block';
        globalFeed.style.display = 'none';
        await loadProfile(user);
      } else {
        authForm.style.display = 'block';
        dashboard.style.display = 'none';
        editForm.style.display = 'none';
      }
    });
  </script>
</body>
</html>
