<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowena's Calculator - Day 9</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;}
        .calculator {background: #111; border: 2px solid #00ff00; border-radius: 15px; padding: 20px; box-shadow: 0 0 20px #00ff00; max-width: 320px; width: 100%;}
        .title {text-align: center; margin-bottom: 15px; font-size: 18px;}
        #display {width: 100%; height: 60px; background: #000; border: 2px solid #00ff00; border-radius: 8px; color: #00ff00; font-size: 32px; text-align: right; padding: 10px; margin-bottom: 15px;}
        .buttons {display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;}
        button {height: 60px; background: #1a1a1a; border: 2px solid #00ff00; border-radius: 8px; color: #00ff00; font-size: 24px; cursor: pointer; transition: all 0.2s;}
        button:hover {background: #00ff00; color: #000; box-shadow: 0 0 15px #00ff00;}
        .operator {background: #003300;}
        .equals {grid-column: span 2; background: #00ff00; color: #000; font-weight: bold;}
        .clear {background: #330000; border-color: #ff0000; color: #ff0000;}
        .clear:hover {background: #ff0000; color: #000;}
        .back {margin-top: 15px; text-align: center;}
        .back a {color: #00ff00; text-decoration: none; border: 1px solid #00ff00; padding: 8px 15px; border-radius: 5px;}
    </style>
</head>
<body>
    <div class="calculator">
        <div class="title">Rowena's Calculator 🧮</div>
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('.')">.</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
        <div class="back"><a href="index.html">← Back to Portfolio</a></div>
    </div>
    <script>
        let display = document.getElementById('display');
        function appendToDisplay(value) {display.value += value;}
        function clearDisplay() {display.value = '';}
        function deleteLast() {display.value = display.value.slice(0, -1);}
        function calculate() {try {display.value = eval(display.value);} catch (error) {display.value = 'Error';}}
    </script>
</body>
</html>
