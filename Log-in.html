<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rowena Login - Full Stack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      text-align: center;
      color: #667eea;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-signup {
      background: #667eea;
      color: white;
    }
    .btn-login {
      background: #764ba2;
      color: white;
    }
    .btn-logout {
      background: #ff4757;
      color: white;
      display: none;
    }
    #message {
      text-align: center;
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    #dashboard {
      display: none;
      text-align: center;
    }
    #dashboard h2 { color: #667eea; margin-bottom: 15px; }
    #userEmail { color: #764ba2; font-weight: bold; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="container">
    <div id="authForm">
      <h1>Welcome Wena! 🔥</h1>
      <p class="subtitle">Full-Stack Login System</p>
      
      <input type="email" id="email" placeholder="Email" autocomplete="email">
      <input type="password" id="password" placeholder="Password (6+ chars)" autocomplete="current-password">
      
      <button class="btn-signup" onclick="signup()">Sign Up</button>
      <button class="btn-login" onclick="login()">Login</button>
      
      <div id="message"></div>
    </div>

    <div id="dashboard">
      <h2>🎉 You're Logged In!</h2>
      <p>Welcome back, <span id="userEmail"></span></p>
      <p style="margin: 20px 0; color: #666;">This is your protected dashboard. Only logged-in users can see this.</p>
      <button class="btn-logout" id="logoutBtn" onclick="logout()">Logout</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCeHwDLfwsAwXh6Wf0fwCw-nwSLSmPj_qI",
      authDomain: "rowena-portfolio.firebaseapp.com",
      projectId: "rowena-portfolio",
      storageBucket: "rowena-portfolio.firebasestorage.app",
      messagingSenderId: "352213537262",
      appId: "1:352213537262:web:b58a90d30c1f5fa78f7eff"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const messageDiv = document.getElementById('message');
    const authForm = document.getElementById('authForm');
    const dashboard = document.getElementById('dashboard');
    const userEmailSpan = document.getElementById('userEmail');
    const logoutBtn = document.getElementById('logoutBtn');

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = type;
      setTimeout(() => {
        messageDiv.textContent = '';
        messageDiv.className = '';
      }, 4000);
    }

    function signup() {
      const email = emailInput.value;
      const password = passwordInput.value;
      
      if (!email || !password) {
        showMessage('Please fill in all fields', 'error');
        return;
      }
      
      if (password.length < 6) {
        showMessage('Password must be 6+ characters', 'error');
        return;
      }

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          showMessage('Account created! You are now logged in 🎉', 'success');
        })
        .catch((error) => {
          showMessage(error.message, 'error');
        });
    }

    function login() {
      const email = emailInput.value;
      const password = passwordInput.value;
      
      if (!email || !password) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          showMessage('Login successful! 🎉', 'success');
        })
        .catch((error) => {
          showMessage('Wrong email or password', 'error');
        });
    }

    function logout() {
      auth.signOut().then(() => {
        showMessage('Logged out successfully', 'success');
      });
    }

    auth.onAuthStateChanged((user) => {
      if (user) {
        authForm.style.display = 'none';
        dashboard.style.display = 'block';
        logoutBtn.style.display = 'block';
        userEmailSpan.textContent = user.email;
      } else {
        authForm.style.display = 'block';
        dashboard.style.display = 'none';
        logoutBtn.style.display = 'none';
        emailInput.value = '';
        passwordInput.value = '';
      }
    });
  </script>
</body>
</html>
